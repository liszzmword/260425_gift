<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffe4ec" />
  <title>선물 골라봐요 🎁</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section id="setup" class="screen">
      <h1>어떤 선물을 줄지 골라봐요</h1>
      <p class="hint">A는 클릭할 수 있고, B는 도망가요 😉</p>

      <div class="gift-form">
        <h2>🅰️ 선물 A <span class="sub">(진짜 줄 선물)</span></h2>
        <label class="image-input">
          <input type="file" accept="image/*" data-target="A" hidden />
          <div class="image-preview" id="previewA">
            <span class="placeholder">+ 이미지 선택</span>
          </div>
        </label>
        <input type="text" id="textA" maxlength="20" placeholder="예: 스타벅스 기프티콘" />
      </div>

      <div class="gift-form">
        <h2>🅱️ 선물 B <span class="sub">(미끼 선물 — 도망감)</span></h2>
        <label class="image-input">
          <input type="file" accept="image/*" data-target="B" hidden />
          <div class="image-preview" id="previewB">
            <span class="placeholder">+ 이미지 선택</span>
          </div>
        </label>
        <input type="text" id="textB" maxlength="20" placeholder="예: 양말" />
      </div>

      <button id="startBtn" class="primary" disabled>링크 만들기</button>
    </section>

    <section id="share" class="screen" hidden>
      <h1>🔗 링크가 만들어졌어요</h1>
      <p class="hint">이 링크를 상대방에게 보내세요</p>
      <div class="share-box">
        <input id="shareLink" type="text" readonly />
      </div>
      <button id="shareBtn" class="primary">📤 공유하기 / 복사</button>
      <button id="previewBtn" class="ghost">👀 내가 먼저 해보기</button>
      <button id="redoBtn" class="ghost">← 다시 만들기</button>
    </section>

    <section id="play" class="screen" hidden>
      <h1>받고 싶은 선물을 골라주세요 🎀</h1>
      <div id="playArea">
        <button class="gift-card" id="cardA" type="button">
          <span class="card-image"></span>
          <span class="card-text"></span>
        </button>
        <button class="gift-card" id="cardB" type="button">
          <span class="card-image"></span>
          <span class="card-text"></span>
        </button>
      </div>
    </section>

    <section id="result" class="screen" hidden>
      <h1 class="celebrate">🎉 축하드립니다!! 🎉</h1>
      <div class="result-gift">
        <div class="result-image"></div>
        <div class="result-text"></div>
      </div>
      <p class="result-message">위 선물을 받게 되셨습니다!</p>
      <button id="restartBtn" class="primary">다시하기</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
